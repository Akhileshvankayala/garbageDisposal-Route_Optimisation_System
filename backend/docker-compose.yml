version: '3.8'

services:
  backend:
    build: .
    container_name: meditrack-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./meditrack.db
      - SECRET_KEY=your-secret-key-change-in-production
      - LOG_LEVEL=INFO
    volumes:
      - ./:/app
      - meditrack-data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - meditrack-network

  frontend:
    image: node:20-alpine
    container_name: meditrack-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../:/app
    command: npm run dev
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - meditrack-network
    depends_on:
      - backend

volumes:
  meditrack-data:

networks:
  meditrack-network:
    driver: bridge
